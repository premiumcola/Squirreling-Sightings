<section class="hero">
  <div class="hero-title-wrap">
    <h1 class="hero-title" aria-label="Squirreling · Sightings">
      <!-- Header brand logo — randomly one of three squirrel
                 variants (Tree-Lens / Branch-Cam / Leaf-Framed),
                 33/33/33, picked once per page-load by
                 chrome/brand-logo.js. The SVG src + alt are populated
                 by JS once the module loads. The launch-transition
                 logic targets `#heroBrandLogo` — keep the id stable. -->
      <img
        id="heroBrandLogo"
        class="hero-brand-glyph"
        src="/static/img/logos/logo-tree-lens-dark.svg"
        alt="Squirreling · Sightings"
      />
      <span class="hero-wordmark">Squirreling · Sightings</span>
    </h1>
    <p class="hero-subtitle">Coral TPU · weather-aware · quest-driven</p>
  </div>
  <div id="heroBuildInfo" class="hero-build" aria-label="Build-Info"></div>
  <button id="openWizardBtn" class="btn-action ghost hidden">⚙️ Setup-Wizard</button>
</section>
